version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

    # Groups minor updates together to prevent noise across your workspaces
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    ignore:
      # Block Dependabot from touching Backstage packages to prevent version tearing
      - dependency-name: "@backstage/*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

      # Freeze Core Compilation, Formatting, and Toolchain stacks
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "eslint*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prettier"
        update-types: ["version-update:semver-major"]
      - dependency-name: "node-gyp"
        update-types: ["version-update:semver-major"]
