name: Check Bump Versions

on:
  schedule:
    - cron: "0 6 * * 5" # Executes every Friday at 06:00 UTC
  workflow_dispatch: # Allows manual overrides via the GitHub Actions dashboard

jobs:
  create-pull-request:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: 🟢 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📦 Install Tools and Check Backstage Upstream Upgrades
        run: |
          yarn install
          yarn backstage-cli versions:bump
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false # Intentionally false to allow version file rewriting

      - name: 🚀 Automatically Orchestrate Branch and Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.WORKFLOW_GITHUB_TOKEN }}
          commit-message: "chore(deps): update backstage and rag plugin dependencies"
          committer: "webstackbuilders-bot <bot@webstackbuilders.com>"
          author: "${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>"
          signoff: false
          branch: "automated/update-dependencies" # Swapped out random timestamps for fixed branch updates
          delete-branch: true
          title: "🔄 Update Core Dependencies & Upstream Framework"
          base: main
          body: |
            ### 🔄 Automated Backstage Dependency Upgrades
            This pull request updates our core framework modules and dependencies to align with the latest Backstage ecosystem release.

            - **Engine Hook**: Executed via `yarn backstage-cli versions:bump`
            - **Target Framework**: Managed under `@webstackbuilders` workspaces

            *Automated thread dispatched by [create-pull-request](https://github.com/peter-evans/create-pull-request).*
          labels: |
            dependencies
            triage
          draft: false
