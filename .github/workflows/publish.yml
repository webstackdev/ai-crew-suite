name: Publish Build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      needs_release: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.release_check.outputs.needs_release }}
    strategy:
      matrix:
        node-version: [22]

    env:
      CI: true
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🟢 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📦 Install Workspace Dependencies
        uses: backstage/actions/yarn-install@2cd6978b476cbdc39fec48346f8b6ca13199dd6a # v0.7.8
        with:
          cache-prefix: ${{ runner.os }}-v${{ matrix.node-version }}

      - name: 🏎️ Initialize Turborepo Remote GitHub Actions Cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: 🔍 Fetch previous commit for release check
        run: git fetch origin '${{ github.event.before }}'

      - name: 📝 Check if release
        if: github.event_name != 'workflow_dispatch'
        id: release_check
        run: node scripts/check-if-release.js
        env:
          COMMIT_SHA_BEFORE: "${{ github.event.before }}"

      - name: 🛠️ Build and Verify Distribution Packages
        run: yarn turbo run build typecheck

      - name: 🚨 Slack Failure Notification
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: "#FF0000"
          SLACK_USERNAME: "Crew Suite Deploy Bot"
          SLACK_TITLE: "❌ Master Build Failed"
          SLACK_MESSAGE: "The main production compilation has failed. Review the logs at: https://github.com{{ github.repository }}/actions/runs/${{ github.run_id }}"

  release:
    needs: build
    if: needs.build.outputs.needs_release == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    env:
      CI: "true"
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 🟢 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: 📦 Install Workspace Dependencies
        uses: backstage/actions/yarn-install@2cd6978b476cbdc39fec48346f8b6ca13199dd6a # v0.7.8
        with:
          cache-prefix: ${{ runner.os }}-v${{ matrix.node-version }}

      - name: 🏎️ Initialize Turborepo Remote GitHub Actions Cache
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0

      - name: 🛠️ Compile Code Artifacts
        run: yarn turbo run build typecheck

      - name: 🚀 Run publish to NPM Registry
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: |
          git config --global user.email "bot@webstackbuilders.com"
          git config --global user.name "webstackbuilders-bot"

          yarn config set npmAuthToken '${NODE_AUTH_TOKEN}'
          yarn config set npmScopes.webstackbuilders.npmRegistryServer "https://npmjs.org"
          yarn config set npmScopes.webstackbuilders.npmPublishRegistry "https://npmjs.org"
          yarn config set npmScopes.webstackbuilders.npmAlwaysAuth true

          yarn workspaces foreach --all --jobs 1 --parallel --no-private npm publish --tolerate-republish

      - name: 🏷️ Create a release tag
        id: create_tag
        run: node scripts/create-release-tag.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Create release on GitHub
        run: node scripts/create-github-release.js ${{ steps.create_tag.outputs.tag_name }} 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Slack Success Notification
        uses: rtCamp/action-slack-notify@v2.3.2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: "#36a64f"
          SLACK_USERNAME: "Crew Suite Deploy Bot"
          SLACK_TITLE: "🚀 New Release Published Successfully"
          SLACK_MESSAGE: "A new version has been deployed under the @webstackbuilders scope! View changelogs here: https://github.com{{ github.repository }}/releases/tag/${{ steps.create_tag.outputs.tag_name }}"
