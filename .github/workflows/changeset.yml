name: Changeset

on:
  push:
    branches:
      - main

jobs:
  create-release-pr:
    name: Create Changeset PR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22] # Upgraded from 18 to align with your v22 monorepo stack

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4 # v4.2.2

      - name: 🟢 Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4 # v4.1.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: 📦 Install Workspace Dependencies
        uses: backstage/actions/yarn-install@2cd6978b476cbdc39fec48346f8b6ca13199dd6a # v0.7.8
        with:
          cache-prefix: ${{ runner.os }}-v${{ matrix.node-version }}

      - name: 🚀 Create Release Pull Request
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: yarn release # Triggers your custom prettier + changelog formatting script
          title: "Version Packages - plugins"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
