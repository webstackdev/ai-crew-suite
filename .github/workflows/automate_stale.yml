name: Automate Staleness

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # Executes at minute 0 past every 6th hour

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write # Grants permissions to flag/close stale issues
      pull-requests: write # Grants permissions to flag/close stale PRs
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Harden GitHub Actions Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: 🧹 Flag Stale Issues and Pull Requests
        uses: actions/stale@1e223db275d687790206a7acac4d1a11bd6fe629 # v10.4.0
        id: stale
        with:
          # --- Issue Configurations ---
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs. Thank you
            for your contributions to the AI Crew Suite.
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: stale
          exempt-issue-labels: >-
            plugin,
            after-vacations,
            will-fix,
            kind/bug,
            kind/enhancement,
            triage

          # --- Pull Request Configurations ---
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity from the author. It will be closed if no further activity occurs.
            If the PR was closed and you want it re-opened, let us know
            and we'll re-open the PR so that you can continue the contribution!
          days-before-pr-stale: 14 # Bumped from 7 to 14 days to provide a safer buffer for complex RAG/AI refactors
          days-before-pr-close: 7 # Bumped from 5 to 7 days to match standard issue cycles
          stale-pr-label: stale
          exempt-pr-labels: >-
            after-vacations,
            will-fix,
            dependencies

          # --- Operation Boundaries ---
          operations-per-run: 150 # Increased from 100 to comfortably evaluate our 24+ workspace branches
