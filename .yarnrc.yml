approvedGitRepositories:
  - "**"

enableScripts: true

npmMinimalAgeGate: 0

packageExtensions:
  # Inject Vitest type resolution scopes contextually via the compiler layer
  "typescript@*":
    peerDependencies:
      vitest: "*"

  # This allows vitest type mapping dependencies to resolve safely across all sub-packages
  "vitest@*":
    dependencies:
      "@types/node": "*"

logFilters:
  - code: YN0060
    text: "@material-ui/core and other dependencies request"
    level: discard
  - code: YN0086
    text: "Some peer dependencies are incorrectly met"
    level: discard

plugins:
  - checksum: 0cfdc882d3c1395592aa6d4690958e70ebbc3a8ee1d888d523dc9e3c74796de26f744c37df66a69212280634f422a88074ba625dce0f7886fbdf2a904a0c38a2
    path: .yarn/plugins/@yarnpkg/plugin-backstage.cjs
    spec: "https://versions.backstage.io/v1/tags/main/yarn-plugin"
