# Production-ready container orchestration configuration layer.

app:
  # In production, when using the app-backend plugin, the frontend bundle 
  # is served by the backend engine under a single unified URL.
  baseUrl: ${BASE_URL}

backend:
  baseUrl: ${BASE_URL}
  listen: ':7007'

  cors:
    origin: ${BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: production
  providers:
    # Disable guest log-ins for safe deployment. Implement OAuth (GitHub, Okta, etc.) here.
    guest: null

catalog:
  locations:
    # Ensure these files are physically bundled into your Docker image layer 
    # if you intend to reference them as seed infrastructure on initialization.
    - type: file
      target: ./examples/entities.yaml
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]
