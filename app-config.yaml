app:
  title: AI Crew Suite
  baseUrl: http://localhost:3000

  extensions:
    - page:catalog:
        config:
          path: /

organization:
  name: AI Crew Suite

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007

  csp:
    connect-src: ["'self'", 'http:', 'https:']

  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  actions:
    pluginSources:
      - auth
      - catalog
      - scaffolder

integrations:
  github: []

proxy: {}

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location]
  locations: []

scaffolder: {}

permission:
  enabled: true

mcpActions:
  name: 'AI Crew Suite MCP Actions'
  description: 'Agentic workflows for Backstage IDP'
