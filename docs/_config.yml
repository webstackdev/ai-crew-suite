title: WebStack Builders AI Crew Suite
description: Documentation for building and using our agentic workflow plugins.

# Theme settings (GitHub Pages native support)
remote_theme: just-the-docs/just-the-docs

# Navigation Controls
nav_sort: case_insensitive # Sorts navigation sidebar automatically
heading_anchors: true      # Automatically generates hover links for ## headers

# Native GitHub Pages Approved Plugins
plugins:
  - jekyll-seo-tag         # Automatically adds metadata for SEO and rich snippets
  - jekyll-sitemap         # Automatically builds a sitemap.xml for search engines
  - jekyll-titles-from-headings # Automates page titles if you forget front matter titles

# Search Settings (Just the Docs built-in local search worker)
search_enabled: true
search:
  tokenizer: '[\s\-]+'    # Tokenizes hyphens so plugin names match cleanly
  preview_words_before: 5
  preview_words_after: 10

# Auxiliary Links (Top Right of the Page)
aux_links:
  "Main Repository": "https://github.com/webstackdev/ai-crew-suite"
